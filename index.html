<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Web Launcher</title>
<meta name="description" content="Ramnagar High School Web Launcher">
<meta name="theme-color" content="#0f0f13">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Web Launcher">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f13;--surface:#1a1a22;--surface2:#22222d;--surface3:#2a2a38;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--text:#f0f0f4;--text2:#9090a8;--text3:#5a5a72;--accent:#6c63ff;--accent2:#8b85ff;--accentbg:rgba(108,99,255,0.15);--green:#22c55e;--red:#ef4444;--amber:#f59e0b;--radius:14px;--radius-sm:9px;--pin:#f59e0b;--pin-bg:rgba(245,158,11,0.1)}
[data-theme="light"]{--bg:#f4f4f8;--surface:#ffffff;--surface2:#f0f0f5;--surface3:#e4e4ed;--border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.13);--text:#18181f;--text2:#5a5a72;--text3:#9090a8;--accentbg:rgba(108,99,255,0.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;transition:background 0.2s,color 0.2s}
.topbar{display:flex;align-items:center;gap:10px;padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.logo{width:32px;height:32px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.app-title{font-size:15px;font-weight:600;letter-spacing:-0.3px}
.app-subtitle{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
.short-name{display:none}.full-name{display:inline}
.spacer{flex:1}
.search-wrap{position:relative;display:flex;align-items:center}
.search-wrap svg{position:absolute;left:10px;color:var(--text3);pointer-events:none}
#searchInput{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:7px 12px 7px 34px;width:200px;outline:none;transition:border-color 0.2s,width 0.2s}
#searchInput:focus{border-color:var(--accent);width:260px}
#searchInput::placeholder{color:var(--text3)}
.top-btn{background:var(--accentbg);border:1px solid rgba(108,99,255,0.3);border-radius:var(--radius-sm);color:var(--accent2);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:7px 12px;cursor:pointer;transition:background 0.15s;white-space:nowrap}
.top-btn:hover{background:rgba(108,99,255,0.25)}
.theme-btn{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text2);font-size:16px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.theme-btn:hover{background:var(--surface3)}
.stats-bar{display:flex;gap:20px;padding:8px 22px;background:var(--surface);border-bottom:1px solid var(--border);font-size:12px;color:var(--text3);font-family:'DM Mono',monospace}
.stats-bar span{color:var(--text2);font-weight:500}
.layout{display:flex;flex:1}
.sidebar{width:190px;background:var(--surface);border-right:1px solid var(--border);padding:14px 10px;display:flex;flex-direction:column;gap:3px;flex-shrink:0;overflow-y:auto}
.sidebar-label{font-size:10px;font-weight:600;letter-spacing:1px;color:var(--text3);text-transform:uppercase;padding:8px 10px 4px;margin-top:6px}
.cat-btn{background:none;border:none;border-radius:var(--radius-sm);color:var(--text2);font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 10px;text-align:left;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background 0.15s,color 0.15s;width:100%}
.cat-btn:hover{background:var(--surface2);color:var(--text)}
.cat-btn.active{background:var(--accentbg);color:var(--accent2);font-weight:500}
.cat-btn .badge{margin-left:auto;background:var(--surface3);border-radius:20px;font-size:10px;padding:1px 7px;color:var(--text3);font-family:'DM Mono',monospace}
.cat-btn.active .badge{background:rgba(108,99,255,0.2);color:var(--accent2)}
.add-cat-btn{background:none;border:1px dashed var(--border2);border-radius:var(--radius-sm);color:var(--text3);font-family:'DM Sans',sans-serif;font-size:12px;padding:7px 10px;cursor:pointer;margin-top:4px;display:flex;align-items:center;gap:6px;transition:border-color 0.15s,color 0.15s;width:100%}
.add-cat-btn:hover{border-color:var(--accent2);color:var(--accent2)}
.main{flex:1;padding:20px;overflow-y:auto}
.section-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.section-header h2{font-size:17px;font-weight:500}
.section-header .count{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace;background:var(--surface2);border-radius:20px;padding:2px 9px}
.pinned-section{margin-bottom:22px}
.pinned-label{font-size:11px;font-weight:600;color:var(--pin);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px;display:flex;align-items:center;gap:5px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px}
.site-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 10px 12px;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;transition:border-color 0.15s,background 0.15s,transform 0.1s;position:relative;user-select:none}
.site-card:hover{border-color:var(--border2);background:var(--surface2);transform:translateY(-2px)}
.site-card:active{transform:scale(0.97)}
.site-card.pinned{border-color:rgba(245,158,11,0.35);background:var(--pin-bg)}
.site-card.dragging{opacity:0.35;transform:scale(0.95)}
.site-card.drag-over{border-color:var(--accent);border-style:dashed}
.site-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;letter-spacing:-0.5px;color:#fff;flex-shrink:0}
.site-name{font-size:12px;font-weight:500;color:var(--text);text-align:center;line-height:1.3;word-break:break-word;width:100%}
.site-domain{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;text-align:center}
.site-visited{font-size:10px;color:var(--text3);text-align:center}
.card-actions{position:absolute;top:6px;right:6px;display:none;gap:3px}
.site-card:hover .card-actions{display:flex}
.card-act{width:20px;height:20px;border-radius:5px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background 0.12s}
.card-act:hover{background:var(--surface3)}
.card-act.pin-btn.active{background:var(--pin-bg);color:var(--pin);border-color:rgba(245,158,11,0.4)}
.card-act.del-btn:hover{background:var(--red);color:#fff;border-color:var(--red)}
.add-card{background:var(--surface);border:1px dashed var(--border2);border-radius:var(--radius);padding:16px 10px 12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:border-color 0.15s,background 0.15s;min-height:114px;color:var(--text3);font-size:13px}
.add-card:hover{border-color:var(--accent2);color:var(--accent2);background:var(--accentbg)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:18px;width:100%;max-width:420px;padding:22px;animation:pop 0.18s ease}
@keyframes pop{from{transform:scale(0.94);opacity:0}to{transform:scale(1);opacity:1}}
.modal h3{font-size:16px;font-weight:600;margin-bottom:16px}
.field{margin-bottom:13px}
.field label{font-size:12px;color:var(--text2);display:block;margin-bottom:5px;font-weight:500}
.field input,.field select{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:9px 12px;outline:none;transition:border-color 0.2s}
.field input:focus,.field select:focus{border-color:var(--accent)}
.field input::placeholder{color:var(--text3)}
.field select option{background:var(--surface)}
.icon-row{display:flex;gap:8px;align-items:center}
.icon-row input{flex:1}
.color-pick{width:40px;height:40px;border-radius:8px;border:1px solid var(--border2);cursor:pointer;padding:2px;background:none}
.modal-btns{display:flex;gap:10px;margin-top:18px}
.btn{flex:1;padding:10px;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;border:none}
.btn-cancel{background:var(--surface2);color:var(--text2)}
.btn-cancel:hover{background:var(--surface3)}
.btn-save{background:var(--accent);color:#fff}
.btn-save:hover{opacity:0.88}
.empty-state{text-align:center;padding:50px 20px;color:var(--text3)}
.empty-state p{font-size:14px}
.repo-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;display:flex;flex-direction:column;gap:6px;cursor:pointer;transition:border-color 0.15s,background 0.15s,transform 0.1s}
.repo-card:hover{border-color:var(--border2);background:var(--surface2);transform:translateY(-2px)}
#toast{position:fixed;bottom:80px;right:20px;background:var(--surface3);border:1px solid var(--border2);color:var(--text);border-radius:10px;padding:10px 18px;font-size:13px;display:none;z-index:9999;animation:fadein 0.2s ease}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:6px 0 max(6px,env(safe-area-inset-bottom));z-index:200;justify-content:space-around}
.bnav-btn{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--text3);font-family:'DM Sans',sans-serif;font-size:10px;cursor:pointer;padding:4px 8px;border-radius:8px;min-width:52px}
.bnav-btn.active{color:var(--accent2)}
.bnav-btn .ico{font-size:19px;line-height:1}
.drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:150}
.drawer-overlay.open{display:block}
.sidebar.drawer-open{transform:translateX(0)!important}
.mobile-search{display:none;align-items:center;padding:8px 12px;background:var(--surface);border-bottom:1px solid var(--border);gap:8px}
.mobile-search input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:8px 12px;outline:none}
.mobile-search input:focus{border-color:var(--accent)}
.mobile-search input::placeholder{color:var(--text3)}
.mobile-add-btn{background:var(--accentbg);border:1px solid rgba(108,99,255,0.3);border-radius:var(--radius-sm);color:var(--accent2);font-size:22px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
@media(max-width:768px){
  .topbar{padding:10px 12px;gap:8px}
  .app-subtitle{font-size:10px}
  .full-name{display:none}.short-name{display:inline}
  .search-wrap,.top-btn,.stats-bar{display:none}
  .sidebar{position:fixed;top:0;left:0;bottom:0;width:240px;z-index:160;transform:translateX(-100%);transition:transform 0.25s ease;padding-top:56px}
  .layout{flex-direction:column}
  .main{padding:12px 10px 80px}
  .grid{grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:9px}
  .site-card{padding:12px 8px 10px;gap:6px}
  .site-icon{width:36px;height:36px}
  .site-name{font-size:11px}
  .site-domain{display:none}
  .card-actions{display:flex}
  .bottom-nav{display:flex}
  .mobile-search{display:flex}
  #toast{bottom:80px;right:10px;left:10px;text-align:center}
}
@media(min-width:769px){.mobile-search{display:none}}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">🚀</div>
  <div><div class="app-title">Web Launcher</div><div class="app-subtitle"><span class="full-name">Ramnagar High School</span><span class="short-name">RHS</span></div></div>
  <div class="spacer"></div>
  <div class="search-wrap">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="searchInput" type="text" placeholder="Search... (Ctrl+K)" oninput="renderGrid()"/>
  </div>
  <button class="theme-btn" onclick="toggleTheme()" id="themeBtn" title="Toggle theme">🌙</button>
  <button class="top-btn" onclick="openAddModal()">+ Add Site</button>
  <button class="top-btn" onclick="exportHTML()" style="background:rgba(34,197,94,0.12);border-color:rgba(34,197,94,0.3);color:#4ade80;">💾 Export</button>
</div>
<div class="mobile-search">
  <input type="text" id="mobileSearchInput" placeholder="Search sites..." oninput="document.getElementById('searchInput').value=this.value;renderGrid()"/>
  <div class="mobile-add-btn" onclick="openAddModal()">+</div>
</div>
<div class="stats-bar">
  <div id="statTotal">Total: <span>0</span></div>
  <div id="statCats">Categories: <span>0</span></div>
  <div id="statPinned">Pinned: <span>0</span></div>
  <div id="statTime">Updated: <span>—</span></div>
</div>
<div class="layout">
  <div class="sidebar">
    <div class="sidebar-label">Categories</div>
    <button class="cat-btn active" id="btn-all-sites"><span>🗂️</span>All Sites<span class="badge" id="badge-all">0</span></button>
    <button class="cat-btn" id="btn-pinned"><span>⭐</span>Favourites<span class="badge" id="badge-pinned">0</span></button>
    <div id="catList"></div>
    <div style="margin-top:6px"><button class="add-cat-btn" onclick="addCategory()"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>New Category</button></div>
    <div class="sidebar-label" style="margin-top:auto;padding-top:10px">Actions</div>
    <button class="cat-btn" onclick="importPresets()"><span>⚡</span>Load RHS Sites</button>
    <button class="cat-btn" id="btn-github-repos" onclick="setView('github')"><span>🐙</span>GitHub Repos<span class="badge" id="badge-gh">—</span></button>
    <button class="cat-btn" onclick="clearAll()" style="color:var(--text3)"><span>🗑️</span>Clear All</button>
  </div>
  <div class="main">
    <div id="viewSites">
      <div class="section-header"><h2 id="catTitle">All Sites</h2><span class="count" id="gridCount">0 sites</span></div>
      <div id="pinnedSection" class="pinned-section" style="display:none">
        <div class="pinned-label">⭐ Favourites</div>
        <div class="grid" id="pinnedGrid"></div>
        <div style="height:18px"></div>
      </div>
      <div class="grid" id="grid"></div>
    </div>
    <div id="viewGithub" style="display:none">
      <div class="section-header"><h2>GitHub Repos — Tmahata12</h2><button class="top-btn" onclick="fetchRepos(true)" style="font-size:12px;padding:5px 12px;">🔄 Refresh</button></div>
      <div id="repoGrid" class="grid"></div>
    </div>
  </div>
</div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">Add New Site</h3>
    <div class="field"><label>Site Name</label><input id="mName" type="text" placeholder="e.g. RHS PRMS"/></div>
    <div class="field"><label>URL</label><input id="mUrl" type="text" placeholder="https://..."/></div>
    <div class="field"><label>Category</label><select id="mCat"></select></div>
    <div class="field"><label>Icon & Color</label><div class="icon-row"><input id="mIcon" type="text" placeholder="📋 or RH" maxlength="4"/><input id="mColor" type="color" class="color-pick" value="#6c63ff"/></div></div>
    <div class="modal-btns"><button class="btn btn-cancel" onclick="closeModal()">Cancel</button><button class="btn btn-save" onclick="saveSite()">Save</button></div>
  </div>
</div>
<div id="toast"></div>
<div class="drawer-overlay" id="drawerOverlay" onclick="closeSidebar()"></div>
<div class="bottom-nav">
  <button class="bnav-btn active" id="bnav-home" onclick="mobileNav('home',this)"><span class="ico">🗂️</span>Sites</button>
  <button class="bnav-btn" id="bnav-pin" onclick="mobileNav('pin',this)"><span class="ico">⭐</span>Favourites</button>
  <button class="bnav-btn" onclick="openSidebar()"><span class="ico">☰</span>Menu</button>
  <button class="bnav-btn" id="bnav-gh" onclick="mobileNav('github',this)"><span class="ico">🐙</span>GitHub</button>
  <button class="bnav-btn" onclick="toggleTheme()"><span class="ico" id="mobileThemeIco">🌙</span>Theme</button>
</div>
<script>
const SK='webLauncherData_v3';
let editingId=null,activeCat='__all__',currentView='sites',dragSrcId=null;

function loadData(){try{return JSON.parse(localStorage.getItem(SK))||{sites:[],categories:[]}}catch(e){return{sites:[],categories:[]}}}
function saveData(d){d.lastUpdated=new Date().toLocaleString();localStorage.setItem(SK,JSON.stringify(d))}

// THEME
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  localStorage.setItem('wl_theme',t);
  document.getElementById('themeBtn').textContent=t==='dark'?'🌙':'☀️';
  const m=document.getElementById('mobileThemeIco');if(m)m.textContent=t==='dark'?'🌙':'☀️';
}
function toggleTheme(){applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark')}
applyTheme(localStorage.getItem('wl_theme')||'dark');

// PRESETS
const PRESETS={
  categories:['School Systems','Render Services','Deployment','Tools','Others'],
  sites:[
    {name:'RHS PRMS v2',url:'https://rhs-prms-v2.onrender.com',cat:'School Systems',icon:'📋',color:'#6c63ff'},
    {name:'WBCHSE XI Result',url:'https://tmahata12.github.io/WBCHSE_XI-RESULT/',cat:'School Systems',icon:'📊',color:'#22c55e'},
    {name:'PRMS Frontend',url:'https://rhs-prms-v2.onrender.com',cat:'Render Services',icon:'🖥️',color:'#0ea5e9'},
    {name:'PRMS API v2',url:'https://rhs-prms-api-v2.onrender.com',cat:'Render Services',icon:'⚙️',color:'#0284c7'},
    {name:'WBCHSE Backend',url:'https://wbbchse-backend.onrender.com',cat:'Render Services',icon:'🔧',color:'#0369a1'},
    {name:'Render Dashboard',url:'https://dashboard.render.com',cat:'Render Services',icon:'🚀',color:'#46E3B7'},
    {name:'GitHub Tmahata12',url:'https://github.com/Tmahata12',cat:'Deployment',icon:'🐙',color:'#374151'},
    {name:'MongoDB Atlas',url:'https://cloud.mongodb.com',cat:'Deployment',icon:'🍃',color:'#16a34a'},
    {name:'Google Drive',url:'https://drive.google.com',cat:'Tools',icon:'📂',color:'#f59e0b'},
    {name:'Gmail',url:'https://mail.google.com',cat:'Tools',icon:'✉️',color:'#ef4444'},
  ]
};
function importPresets(){
  const d=loadData();const ex=new Set(d.sites.map(s=>s.url));
  PRESETS.categories.forEach(c=>{if(!d.categories.includes(c))d.categories.push(c)});
  PRESETS.sites.forEach(s=>{if(!ex.has(s.url))d.sites.push({...s,id:uid(),pinned:false,visitCount:0,lastVisited:null})});
  saveData(d);renderAll();toast('RHS sites loaded!');
}

// UTILS
function uid(){return Math.random().toString(36).slice(2,10)}
function domain(url){try{return new URL(url).hostname.replace('www.','')}catch(e){return url}}
function initials(name){return name.trim().split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2)}
function timeAgo(ts){
  if(!ts)return'Never';
  const d=Math.floor((Date.now()-ts)/1000);
  if(d<60)return'Just now';if(d<3600)return Math.floor(d/60)+'m ago';
  if(d<86400)return Math.floor(d/3600)+'h ago';return Math.floor(d/86400)+'d ago';
}
function toast(msg,dur=2200){
  const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';
  clearTimeout(t._t);t._t=setTimeout(()=>{t.style.display='none'},dur);
}

// RENDER
function renderAll(){renderSidebar();renderGrid();updateStats()}

function renderSidebar(){
  const d=loadData();
  const pinned=d.sites.filter(s=>s.pinned).length;
  document.getElementById('badge-all').textContent=d.sites.length;
  document.getElementById('badge-pinned').textContent=pinned;
  const icons={'School Systems':'🏫','Deployment':'☁️','Tools':'🛠️','Others':'📌','Render Services':'🚀'};
  document.getElementById('catList').innerHTML=d.categories.map(cat=>{
    const count=d.sites.filter(s=>s.cat===cat).length;
    const active=activeCat===cat&&currentView==='sites';
    return`<button class="cat-btn ${active?'active':''}" data-cat="${cat}"><span>${icons[cat]||'📁'}</span>${cat}<span class="badge">${count}</span></button>`;
  }).join('');
  document.getElementById('catList').querySelectorAll('.cat-btn').forEach(btn=>{
    btn.addEventListener('click',function(){
      activeCat=this.getAttribute('data-cat');showSitesView();
      document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
      this.classList.add('active');renderGrid();closeSidebar();
    });
  });
}

function cardHTML(s){
  return`<div class="site-card ${s.pinned?'pinned':''}" data-id="${s.id}" draggable="true">
    <div class="card-actions">
      <div class="card-act pin-btn ${s.pinned?'active':''}" data-pin="${s.id}" title="${s.pinned?'Unpin':'Pin to Favourites'}">⭐</div>
      <div class="card-act del-btn" data-del="${s.id}" title="Remove">✕</div>
    </div>
    <div class="site-icon" style="background:${s.color}">${s.icon||initials(s.name)}</div>
    <div class="site-name">${s.name}</div>
    <div class="site-domain">${domain(s.url)}</div>
    <div class="site-visited">${timeAgo(s.lastVisited)}</div>
  </div>`;
}

function attachCardEvents(container){
  container.querySelectorAll('.site-card').forEach(card=>{
    card.addEventListener('click',function(e){
      if(e.target.closest('.card-actions'))return;
      const id=this.getAttribute('data-id');
      const d=loadData();const s=d.sites.find(x=>x.id===id);
      if(s){s.lastVisited=Date.now();s.visitCount=(s.visitCount||0)+1;saveData(d);window.open(s.url,'_blank');renderGrid()}
    });
    card.addEventListener('dragstart',function(){dragSrcId=this.getAttribute('data-id');this.classList.add('dragging')});
    card.addEventListener('dragend',function(){this.classList.remove('dragging')});
    card.addEventListener('dragover',function(e){e.preventDefault();this.classList.add('drag-over')});
    card.addEventListener('dragleave',function(){this.classList.remove('drag-over')});
    card.addEventListener('drop',function(e){
      e.preventDefault();this.classList.remove('drag-over');
      const targetId=this.getAttribute('data-id');
      if(!dragSrcId||dragSrcId===targetId)return;
      const d=loadData();
      const from=d.sites.findIndex(x=>x.id===dragSrcId);
      const to=d.sites.findIndex(x=>x.id===targetId);
      if(from<0||to<0)return;
      const[item]=d.sites.splice(from,1);d.sites.splice(to,0,item);
      saveData(d);renderGrid();toast('Order saved!');
    });
  });
  container.querySelectorAll('[data-pin]').forEach(btn=>{
    btn.addEventListener('click',function(e){
      e.stopPropagation();const id=this.getAttribute('data-pin');
      const d=loadData();const s=d.sites.find(x=>x.id===id);
      if(s){s.pinned=!s.pinned;saveData(d);renderAll();toast(s.pinned?'⭐ Pinned!':'Unpinned')}
    });
  });
  container.querySelectorAll('[data-del]').forEach(btn=>{
    btn.addEventListener('click',function(e){
      e.stopPropagation();if(!confirm('Remove this site?'))return;
      const id=this.getAttribute('data-del');
      const d=loadData();d.sites=d.sites.filter(s=>s.id!==id);
      saveData(d);renderAll();toast('Removed');
    });
  });
}

function renderGrid(){
  const d=loadData();
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  let sites=d.sites;
  if(activeCat==='__pinned__')sites=sites.filter(s=>s.pinned);
  else if(activeCat!=='__all__')sites=sites.filter(s=>s.cat===activeCat);
  if(q)sites=sites.filter(s=>s.name.toLowerCase().includes(q)||domain(s.url).includes(q));

  document.getElementById('catTitle').textContent=activeCat==='__all__'?'All Sites':activeCat==='__pinned__'?'Favourites':activeCat;
  document.getElementById('gridCount').textContent=sites.length+' site'+(sites.length!==1?'s':'');

  const pinnedSec=document.getElementById('pinnedSection');
  const pinnedGrid=document.getElementById('pinnedGrid');
  if(activeCat==='__all__'&&!q){
    const pinned=sites.filter(s=>s.pinned);
    if(pinned.length){pinnedSec.style.display='block';pinnedGrid.innerHTML=pinned.map(s=>cardHTML(s)).join('');attachCardEvents(pinnedGrid)}
    else pinnedSec.style.display='none';
    sites=sites.filter(s=>!s.pinned);
  } else {pinnedSec.style.display='none'}

  const grid=document.getElementById('grid');
  const isEmpty=!sites.length&&pinnedSec.style.display!=='block';
  grid.innerHTML=isEmpty
    ?`<div class="empty-state" style="grid-column:1/-1"><p>${q?'No results for "'+q+'"':'No sites yet — click Add Site'}</p></div>`
    :sites.map(s=>cardHTML(s)).join('')+`<div class="add-card" onclick="openAddModal('${activeCat==='__all__'||activeCat==='__pinned__'?'':activeCat}')"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>Add Site</div>`;
  if(!isEmpty)attachCardEvents(grid);
}

function updateStats(){
  const d=loadData();const p=d.sites.filter(s=>s.pinned).length;
  document.getElementById('statTotal').innerHTML=`Total: <span>${d.sites.length}</span>`;
  document.getElementById('statCats').innerHTML=`Categories: <span>${d.categories.length}</span>`;
  document.getElementById('statPinned').innerHTML=`Pinned: <span>${p}</span>`;
  document.getElementById('statTime').innerHTML=`Updated: <span>${d.lastUpdated||'—'}</span>`;
}

function addCategory(){const n=prompt('Category name:');if(!n||!n.trim())return;const d=loadData();if(!d.categories.includes(n.trim())){d.categories.push(n.trim());saveData(d);renderAll()}}
function clearAll(){if(!confirm('Clear ALL data?'))return;localStorage.removeItem(SK);renderAll();toast('Cleared')}
function showSitesView(){document.getElementById('viewSites').style.display='block';document.getElementById('viewGithub').style.display='none';currentView='sites'}

// MODAL
function openAddModal(preCat){
  editingId=null;
  document.getElementById('modalTitle').textContent='Add New Site';
  ['mName','mUrl','mIcon'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('mColor').value='#6c63ff';
  populateCatSelect(preCat||(activeCat!=='__all__'&&activeCat!=='__pinned__'?activeCat:''));
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('mName').focus(),80);
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open')}
function populateCatSelect(sel){
  const d=loadData();const s=document.getElementById('mCat');
  s.innerHTML=d.categories.map(c=>`<option value="${c}"${c===sel?' selected':''}>${c}</option>`).join('');
  if(!d.categories.length)s.innerHTML='<option value="Others">Others</option>';
}
function saveSite(){
  const name=document.getElementById('mName').value.trim();
  const url=document.getElementById('mUrl').value.trim();
  const cat=document.getElementById('mCat').value;
  const icon=document.getElementById('mIcon').value.trim();
  const color=document.getElementById('mColor').value;
  if(!name||!url){toast('Name and URL required!');return}
  let fullUrl=url;if(!url.startsWith('http'))fullUrl='https://'+url;
  const d=loadData();
  if(editingId){const idx=d.sites.findIndex(s=>s.id===editingId);if(idx!==-1)d.sites[idx]={...d.sites[idx],name,url:fullUrl,cat,icon,color}}
  else{d.sites.push({id:uid(),name,url:fullUrl,cat,icon,color,pinned:false,visitCount:0,lastVisited:null});if(!d.categories.includes(cat))d.categories.push(cat)}
  saveData(d);renderAll();closeModal();toast(editingId?'Updated!':'Site added!');
}

// GITHUB
function setView(view){
  currentView=view;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  if(view==='github'){
    document.getElementById('viewSites').style.display='none';
    document.getElementById('viewGithub').style.display='block';
    document.getElementById('btn-github-repos').classList.add('active');
    fetchRepos();
  } else {showSitesView();renderAll()}
}
async function fetchRepos(force){
  const CK='ghReposCache',CT='ghReposCacheTime';
  const grid=document.getElementById('repoGrid');
  if(!force){const c=localStorage.getItem(CK);const ct=parseInt(localStorage.getItem(CT)||'0');if(c&&Date.now()-ct<600000){renderRepos(JSON.parse(c));return}}
  grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text3);font-size:13px">🔄 Loading repos...</div>`;
  try{
    const res=await fetch('https://api.github.com/users/Tmahata12/repos?per_page=100&sort=updated');
    if(!res.ok)throw new Error();
    const repos=await res.json();
    localStorage.setItem(CK,JSON.stringify(repos));localStorage.setItem(CT,Date.now().toString());
    document.getElementById('badge-gh').textContent=repos.length;renderRepos(repos);
  }catch(e){grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--red);font-size:13px">⚠️ Could not load repos.</div>`}
}
function renderRepos(repos){
  const grid=document.getElementById('repoGrid');
  document.getElementById('badge-gh').textContent=repos.length;
  const lc={'JavaScript':'#f1e05a','HTML':'#e34c26','CSS':'#563d7c','Python':'#3572A5','TypeScript':'#2b7489'};
  grid.innerHTML=repos.map(r=>{
    const liveUrl=r.has_pages?`https://tmahata12.github.io/${r.name}/`:null;
    const upd=new Date(r.updated_at).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'2-digit'});
    return`<div class="repo-card" onclick="window.open('${liveUrl||r.html_url}','_blank')">
      <div style="display:flex;align-items:center;gap:7px"><span style="font-size:15px">${r.fork?'🍴':'📦'}</span><span style="font-size:12px;font-weight:600;color:var(--text);word-break:break-word">${r.name}</span></div>
      ${r.description?`<div style="font-size:11px;color:var(--text2);line-height:1.4">${r.description.slice(0,65)}${r.description.length>65?'…':''}</div>`:''}
      <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-top:2px">
        ${r.language?`<span style="display:flex;align-items:center;gap:3px;font-size:10px;color:var(--text3)"><span style="width:7px;height:7px;border-radius:50%;background:${lc[r.language]||'#5a5a72'};display:inline-block"></span>${r.language}</span>`:''}
        ${liveUrl?`<span style="font-size:10px;background:rgba(34,197,94,0.15);color:#4ade80;border-radius:4px;padding:1px 5px">🌐 Live</span>`:''}
        <span style="font-size:10px;color:var(--text3);margin-left:auto">${upd}</span>
      </div>
      <div style="display:flex;gap:5px;margin-top:4px">
        <a href="${r.html_url}" target="_blank" onclick="event.stopPropagation()" style="flex:1;text-align:center;font-size:10px;padding:4px;background:var(--surface3);border-radius:5px;color:var(--text2);text-decoration:none">GitHub</a>
        ${liveUrl?`<a href="${liveUrl}" target="_blank" onclick="event.stopPropagation()" style="flex:1;text-align:center;font-size:10px;padding:4px;background:rgba(34,197,94,0.1);border-radius:5px;color:#4ade80;text-decoration:none">Open App</a>`:''}
      </div>
    </div>`;
  }).join('');
}

t class="sr" type="text" placeholder="Search..." oninput="filterCards(this.value)"/></div><main>${secs}</main><script>function filterCards(q){document.querySelectorAll('.c').forEach(c=>{const n=c.querySelector('.n').textContent.toLowerCase();c.style.display=n.includes(q.toLowerCase())||!q?'flex':'none'})}<\/script></body></html>`;

function closeSidebar(){document.querySelector('.sidebar').classList.remove('drawer-open');document.getElementById('drawerOverlay').classList.remove('open')}

  else if(view==='pin'){activeCat='__pinned__';showSitesView();renderAll()}
